name: Fetch Subscriptions

on:
  push:
    paths:
      - '.github/workflows/fetch.yaml'
      - 'w38.py'
      - 'config.yaml'
  workflow_dispatch:
  schedule:
    # 北京时间每天 00:00 和 12:00 运行 (UTC 16:00 和 04:00)
    - cron: '0 16 * * *'
    - cron: '0 4 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install pyyaml requests loguru tqdm retry

      - name: 执行任务
        env:
          TZ: Asia/Shanghai 
        run: |
          python w38.py

      - name: 提交并推送更改
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. 将生成的文件加入暂存区
          git add latest.yaml url.txt v2ray.txt channel_stats.csv
          
          # 2. 检查是否有实际变更
          if git diff --quiet --staged; then
            echo "无更改需要提交"
            exit 0
          fi
          
          # 3. 规避 Unstaged changes 错误：
          # 先暂存工作区改动，拉取远程更新后再弹出改动，实现优雅合并
          git stash
          git pull --rebase origin main || git pull --rebase origin master
          git stash pop
          
          # 4. 提交更改
          git commit -m "🍀 自动更新订阅 $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 5. 推送更改
          git push
